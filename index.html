
<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Mrs. Ashgan — From Kermina</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Caveat:wght@600;700&family=Cairo:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080c12;
            --panel: rgba(13, 19, 28, 0.97);
            --border: #1e2d42;
            --border-glow: #1f4068;
            --blue: #4da8ff;
            --blue-deep: #1055a0;
            --purple: #b794f4;
            --teal: #38bdf8;
            --green: #34d399;
            --red: #f87171;
            --gold: #fbbf24;
            --pink: #f472b6;
            --text: #cdd9e5;
            --dim: #637089;
            --kw: #f87171;
            --fn: #b794f4;
            --str: #7dd3fc;
            --cmt: #637089;
            --ch-accent: #4da8ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            overflow-y: auto;
        }

        .cursor-star {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: star-fade .8s ease forwards;
        }

        @keyframes star-fade {
            0% {
                opacity: 1;
                transform: scale(1)
            }

            100% {
                opacity: 0;
                transform: scale(0) translateY(-20px)
            }
        }

        #xp-bar-wrap {
            position: fixed;
            top: 3px;
            left: 0;
            right: 0;
            height: 3px;
            z-index: 200;
            pointer-events: none;
        }

        #xp-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), var(--pink), var(--purple));
            transition: width .4s ease;
        }

        #xp-toast {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 19, 28, .95);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: .28rem .85rem;
            font-size: .68rem;
            color: var(--gold);
            z-index: 300;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            font-family: 'JetBrains Mono', monospace;
        }

        #xp-toast.show {
            opacity: 1;
        }

        #audio-btn {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 200;
            background: rgba(13, 19, 28, .92);
            border: 1px solid var(--border);
            color: var(--dim);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all .3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        #audio-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
            box-shadow: 0 0 20px rgba(77, 168, 255, .3);
        }

        #audio-btn.playing {
            border-color: var(--green);
            color: var(--green);
            animation: pulse-ring 1.8s ease-in-out infinite;
        }

        @keyframes pulse-ring {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(52, 211, 153, .5)
            }

            50% {
                box-shadow: 0 0 0 10px rgba(52, 211, 153, 0)
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 600;
            background: rgba(4, 8, 16, .75);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s;
            backdrop-filter: blur(14px);
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            position: relative;
            width: 90%;
            max-width: 480px;
            background: linear-gradient(160deg, #0d1b2e, #0b1420);
            border: 1px solid rgba(183, 148, 244, .42);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            text-align: center;
            overflow: hidden;
            transform: scale(.75) translateY(30px);
            transition: transform .5s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 0 80px rgba(183, 148, 244, .22), 0 40px 80px rgba(0, 0, 0, .6), inset 0 1px 0 rgba(255, 255, 255, .05);
        }

        .modal-overlay.show .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(183, 148, 244, .14), transparent 65%);
            pointer-events: none;
        }

        .modal-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 1.5rem;
            animation: float-emoji 3s ease-in-out infinite;
            filter: drop-shadow(0 0 22px rgba(183, 148, 244, .7));
        }

        @keyframes float-emoji {

            0%,
            100% {
                transform: translateY(0) rotate(-3deg)
            }

            50% {
                transform: translateY(-10px) rotate(3deg)
            }
        }

        .modal-msg {
            font-family: 'Syne', sans-serif;
            font-size: 1.55rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: .6rem;
            background: linear-gradient(135deg, #fff, var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-sub {
            font-size: .87rem;
            color: var(--dim);
            line-height: 1.8;
            margin-top: .6rem;
            max-width: 330px;
            margin-left: auto;
            margin-right: auto;
        }

        .modal-close {
            margin-top: 1.8rem;
            background: linear-gradient(135deg, rgba(183, 148, 244, .18), rgba(77, 168, 255, .18));
            border: 1px solid rgba(183, 148, 244, .45);
            color: var(--purple);
            padding: .72rem 2.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: .83rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: .5px;
            transition: all .25s;
        }

        .modal-close:hover {
            background: linear-gradient(135deg, rgba(183, 148, 244, .4), rgba(77, 168, 255, .3));
            color: #fff;
            transform: translateY(-1px);
        }

        #unlock-modal {
            position: fixed;
            inset: 0;
            z-index: 700;
            background: rgba(0, 0, 0, .9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s;
            backdrop-filter: blur(16px);
        }

        #unlock-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .unlock-box {
            background: linear-gradient(160deg, #0d1b2e, #120d20);
            border: 1px solid var(--gold);
            border-radius: 24px;
            padding: 3.5rem;
            text-align: center;
            max-width: 520px;
            width: 90%;
            box-shadow: 0 0 100px rgba(251, 191, 36, .2), 0 40px 80px rgba(0, 0, 0, .7);
            position: relative;
            overflow: hidden;
        }

        .unlock-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(251, 191, 36, .1), transparent 70%);
            pointer-events: none;
        }

        .unlock-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
            animation: unlock-pop .6s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }

        @keyframes unlock-pop {
            0% {
                transform: scale(0) rotate(-20deg)
            }

            100% {
                transform: scale(1) rotate(0)
            }
        }

        .unlock-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--pink));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .unlock-msg {
            font-size: .98rem;
            color: var(--text);
            line-height: 2;
            max-width: 380px;
            margin: 0 auto 2rem;
        }

        .unlock-close {
            background: linear-gradient(135deg, rgba(251, 191, 36, .2), rgba(244, 114, 182, .2));
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: .8rem 2.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: .88rem;
            transition: all .2s;
        }

        .unlock-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(251, 191, 36, .3);
        }

        #crt-flash {
            position: fixed;
            inset: 0;
            z-index: 400;
            background: #7dd3fc;
            pointer-events: none;
            opacity: 0;
        }

        #crt-flash.flash {
            animation: crt-anim .45s ease forwards;
        }

        @keyframes crt-anim {
            0% {
                opacity: .3
            }

            15% {
                opacity: 0
            }

            30% {
                opacity: .12
            }

            50% {
                opacity: 0
            }

            100% {
                opacity: 0
            }
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--blue-deep), var(--blue), var(--purple), var(--pink));
            width: 0%;
            transition: width .6s ease;
            z-index: 150;
        }

        .chapter-counter {
            position: fixed;
            top: 14px;
            right: 1.5rem;
            font-size: .72rem;
            color: var(--dim);
            z-index: 150;
            background: rgba(8, 12, 18, .88);
            padding: .28rem .65rem;
            border-radius: 5px;
            border: 1px solid var(--border);
            letter-spacing: 1px;
            backdrop-filter: blur(6px);
        }

        .top-nav {
            position: fixed;
            top: 10px;
            left: 1.5rem;
            display: flex;
            gap: .35rem;
            z-index: 150;
        }

        .nav-btn {
            font-size: .68rem;
            color: var(--dim);
            background: rgba(8, 12, 18, .88);
            padding: .28rem .65rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            transition: all .2s;
            letter-spacing: 1px;
            backdrop-filter: blur(6px);
            line-height: 1.6;
        }

        .nav-btn:hover:not(:disabled) {
            color: var(--blue);
            border-color: var(--blue);
        }

        .nav-btn:disabled {
            opacity: .2;
            cursor: not-allowed;
        }

        .nav-btn.skip:hover:not(:disabled) {
            color: var(--purple);
            border-color: var(--purple);
        }

        .lang-active {
            color: var(--purple) !important;
            border-color: var(--purple) !important;
        }

        .kb-hint {
            position: fixed;
            bottom: 1.2rem;
            right: 1.5rem;
            font-size: .62rem;
            color: var(--dim);
            z-index: 150;
            opacity: .35;
            letter-spacing: .5px;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity .6s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-screen.gone {
            display: none;
        }

        .loading-bar {
            width: 300px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .loading-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
            width: 0%;
            animation: fill-anim 2.4s ease forwards;
        }

        @keyframes fill-anim {
            to {
                width: 100%;
            }
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: .14;
            pointer-events: none;
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 999;
        }

        .chapter {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 2.5rem;
            padding: 5.5rem 2rem 5rem;
            opacity: 0;
            transform: scale(.96) translateY(24px);
            pointer-events: none;
            transition: opacity .65s, transform .65s;
        }

        .chapter.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .chapter.exit {
            opacity: 0;
            transform: scale(1.04) translateY(-20px);
            pointer-events: none;
        }

        @keyframes glitch-in {
            0% {
                opacity: 0;
                filter: blur(8px) brightness(2.5);
                transform: scale(1.04) skewX(1.5deg)
            }

            50% {
                opacity: .9;
                filter: blur(1px) brightness(1.2);
                transform: scale(1.005)
            }

            100% {
                opacity: 1;
                filter: none;
                transform: none
            }
        }

        .chapter.glitch-enter {
            animation: glitch-in .5s ease forwards;
        }

        .chapter[data-accent="blue"] {
            --ch-accent: var(--blue);
        }

        .chapter[data-accent="purple"] {
            --ch-accent: var(--purple);
        }

        .chapter[data-accent="teal"] {
            --ch-accent: var(--teal);
        }

        .chapter[data-accent="green"] {
            --ch-accent: var(--green);
        }

        .chapter[data-accent="gold"] {
            --ch-accent: var(--gold);
        }

        .chapter[data-accent="pink"] {
            --ch-accent: var(--pink);
        }

        .chapter[data-accent="red"] {
            --ch-accent: var(--red);
        }

        .terminal {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, .6);
            overflow: hidden;
            transition: border-color .3s;
        }

        .terminal:hover {
            border-color: var(--ch-accent);
        }

        .terminal-header {
            background: #0b1520;
            padding: .75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-r {
            background: #ff5f56;
        }

        .dot-y {
            background: #ffbd2e;
        }

        .dot-g {
            background: #27c93f;
        }

        .terminal-title {
            margin-left: 1rem;
            font-size: .82rem;
            color: var(--dim);
            font-family: 'JetBrains Mono', monospace !important;
        }

        .terminal-body {
            padding: 1.5rem;
            font-size: .92rem;
            line-height: 1.95;
        }

        .prompt {
            color: var(--ch-accent);
        }

        .output {
            color: var(--text);
            margin: .4rem 0;
        }

        .success {
            color: var(--green);
        }

        .warn {
            color: var(--gold);
        }

        .code-block {
            background: #050810;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.1rem 1.3rem;
            margin: .8rem 0;
            font-size: .87rem;
            direction: ltr !important;
            text-align: left !important;
            font-family: 'JetBrains Mono', monospace !important;
            line-height: 1.85;
        }

        .code-line {
            margin: .22rem 0;
        }

        .ln {
            color: var(--dim);
            margin-right: 1.2rem;
            user-select: none;
            font-size: .77rem;
        }

        .kw {
            color: var(--kw);
        }

        .fn {
            color: var(--fn);
        }

        .str {
            color: var(--str);
        }

        .cmt {
            color: var(--cmt);
            font-style: italic;
        }

        .next-button {
            background: linear-gradient(135deg, var(--blue-deep), var(--blue));
            border: none;
            color: #fff;
            padding: 1rem 2.8rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: .92rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all .3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(21, 101, 192, .4);
            position: relative;
            overflow: hidden;
            z-index: 50;
            margin-bottom: 2rem;
        }

        .next-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(21, 101, 192, .6);
        }

        .chapter-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.8rem, 4vw, 3.2rem);
            text-align: center;
            margin-bottom: .5rem;
            background: linear-gradient(135deg, var(--ch-accent), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .chapter-subtitle {
            text-align: center;
            color: var(--dim);
            font-size: .93rem;
            margin-bottom: .5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            padding: 0 .5rem;
        }

        .stat-box {
            background: linear-gradient(160deg, rgba(13, 19, 28, .94), rgba(8, 12, 18, .97));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.1rem 1.7rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .55rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity .5s, transform .5s, border-color .3s, box-shadow .3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .3), inset 0 1px 0 rgba(255, 255, 255, .04);
        }

        .stat-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, .04), transparent 65%);
            pointer-events: none;
        }

        .stat-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stat-box:hover {
            border-color: var(--ch-accent);
            box-shadow: 0 16px 50px rgba(0, 0, 0, .4), 0 0 28px rgba(77, 168, 255, .1);
            transform: translateY(-6px);
        }

        .stat-label {
            color: var(--dim);
            font-size: .77rem;
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .stat-value {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            color: var(--ch-accent);
            line-height: 1.1;
            word-break: break-word;
            width: 100%;
        }

        .stat-note {
            color: var(--cmt);
            font-size: .72rem;
            margin-top: .4rem;
            font-style: italic;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            margin-top: .3rem;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: live-pulse 1.1s ease-in-out infinite;
        }

        @keyframes live-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1
            }

            50% {
                transform: scale(1.7);
                opacity: .35
            }
        }

        .live-text {
            font-size: .66rem;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .heart-stage {
            text-align: center;
            padding: 1rem 0 .5rem;
        }

        .heart {
            font-size: 5rem;
            display: inline-block;
            cursor: pointer;
            transition: all .5s cubic-bezier(.34, 1.56, .64, 1);
            filter: grayscale(100%) opacity(.5);
            position: relative;
        }

        .heart:hover {
            filter: grayscale(50%) opacity(.75);
            transform: scale(1.08);
        }

        .heart-hint {
            font-size: .77rem;
            color: var(--dim);
            margin-top: .8rem;
            animation: pulse-hint 2s ease-in-out infinite;
            letter-spacing: .5px;
        }

        @keyframes pulse-hint {

            0%,
            100% {
                opacity: .35
            }

            50% {
                opacity: .9
            }
        }

        .heart.blooming {
            filter: grayscale(0%) opacity(1) !important;
            animation: heart-bloom 1.2s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }

        @keyframes heart-bloom {
            0% {
                transform: scale(1)
            }

            30% {
                transform: scale(1.5) rotate(-8deg)
            }

            60% {
                transform: scale(1.2) rotate(5deg)
            }

            100% {
                transform: scale(1) rotate(0)
            }
        }

        .build-log {
            margin-top: 1.4rem;
            font-size: .83rem;
            line-height: 1;
            min-height: 200px;
            direction: ltr;
            text-align: left;
        }

        .log-line {
            display: flex;
            align-items: baseline;
            gap: .6rem;
            padding: .38rem 0;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity .4s, transform .4s;
        }

        .log-line.show {
            opacity: 1;
            transform: translateY(0);
        }

        .log-line.personal {
            padding: .55rem .8rem;
            margin: .3rem 0;
            background: rgba(244, 114, 182, .04);

                // NEW: Journey Through Memories
                'mem.title': 'Journey Through Memories', 'mem.subtitle': 'Press Start to walk through the moments that stayed.',
                'mem.start': '▶ Start the Journey',
                'mem.scenes': [
                    { icon: '🚪', title: 'The First Day', subtitle: 'Stepping into the unknown.', text: 'She walked in not knowing a soul. The room was full of strangers. Then a teacher smiled — not a polite smile, but a real one. Like she already saw something worth believing in.', accent: 'blue' },
                    { icon: '💡', title: 'The First Project', subtitle: 'When something clicked for real.', text: 'Hours of confusion. Then one line worked. Then another. Then — it ran. She stared at the screen. She had built something. It wasn\'t perfect. But it was hers. She ran to show Mrs. Ashgan first.', accent: 'teal' },
                    { icon: '🖥️', title: 'In the Lab', subtitle: 'The quiet hum of keyboards.', text: 'The computer lab had a smell — cables and coffee and concentration. Every seat taken. Every student in their own world. But somehow, Mrs. Ashgan was present for all of them. She moved through the room like she had radar for who needed her.', accent: 'purple' },
                    { icon: '⭐', title: 'Trusted to Help', subtitle: 'The moment everything changed.', text: 'One day, Mrs. Ashgan turned to her and said: "Can you help explain this to the class?" She froze. Then she breathed. Then she stood up. That single question planted something she\'s still growing into.', accent: 'gold' },
                ],
                'mem.next': 'Next Memory →',
                'mem.finish': 'Continue the Journey →',

                // NEW: Inside My Mind
                'mind.title': 'Inside My Mind', 'mind.subtitle': 'Click a bubble to explore what lives here.',
                'mind.bubbles': [
                    { id: 'curiosity', label: 'Curiosity', icon: '🔍', color: 'teal', x: 18, y: 14, desc: 'Mrs. Ashgan made asking questions feel like an adventure, not a risk. She never made me feel stupid for not knowing. She made me feel brave for asking.', memory: '"What if we tried it a different way?" — that question changed how I think forever.' },
                    { id: 'projects', label: 'Projects', icon: '🚀', color: 'blue', x: 63, y: 10, desc: 'Every project was a small world I got to build from nothing. The first one barely worked. The last one I was proud of. That gap — Mrs. Ashgan lived in that gap with me.', memory: 'The first time my code actually ran, I didn\'t celebrate. I just sat very still and felt something settle.' },
                    { id: 'confidence', label: 'Confidence', icon: '✨', color: 'purple', x: 77, y: 50, desc: 'I didn\'t arrive with confidence. It was given to me, slowly, one moment at a time. "You can do this" — said enough times by the right person — becomes a voice inside your own head.', memory: 'The day I stopped waiting for permission to believe in myself was the day Mrs. Ashgan stopped needing to tell me I could.' },
                    { id: 'helping', label: 'Helping Others', icon: '💙', color: 'pink', x: 14, y: 60, desc: 'She modeled it every single day. Helping wasn\'t something she did when she had time. It was how she showed up. I learned that from watching her, not from a lesson.', memory: 'She trusted me to help explain something to the class once. I think about that more than almost anything else.' },
                    { id: 'gratitude', label: 'Gratitude', icon: '🙏', color: 'gold', x: 47, y: 73, desc: 'Gratitude isn\'t a feeling that fades — it compounds. Every time I use something she taught me, it grows. This whole page is gratitude made visible.', memory: 'There\'s no algorithm for what she gave me. But I keep trying to write one.' },
                    { id: 'growth', label: 'Growth', icon: '🌱', color: 'green', x: 36, y: 38, desc: 'She taught me that growth isn\'t linear. It\'s messy, slow, and often invisible — until it suddenly isn\'t. She held space for all the stages I was still in.', memory: 'I became someone different in that classroom. Not all at once. But unmistakably.' },
                    { id: 'creativity', label: 'Creativity', icon: '🎨', color: 'pink', x: 79, y: 74, desc: 'She gave me permission to make things badly until they got good. That single permission changed everything about how I approach creating.', memory: 'The first project that truly felt mine — I remember the exact moment I stopped copying and started creating.' },
                ],
                'mind.close': '× close',

                // NEW: Moments That Stayed  
                'stay.title': 'Moments That Stayed', 'stay.subtitle': 'Not the big ones. The quiet ones that rewrote something.',
                'stay.moments': [
                    { dot: '🚪', year: 'Day 1', label: 'She smiled like she already knew.', detail: 'Before Kermina said a word, before she proved anything, Mrs. Ashgan looked at her and smiled like she saw someone worth knowing. That moment cost nothing. It changed everything.', color: 'blue' },
                    { dot: '💬', year: 'Week 1', label: 'She made the wrong answer safe.', detail: 'A student answered wrong. The whole class waited. Mrs. Ashgan said: "That\'s interesting — tell me how you got there." The student explained. The class learned more from the wrong answer than the right one.', color: 'purple' },
                    { dot: '💡', year: 'Month 1', label: 'She stayed after class.', detail: 'Not because she had to. Because Kermina had a question she was embarrassed to ask in front of everyone. Mrs. Ashgan stayed, listened, and then said: "That\'s actually a really good question." It was the first time Kermina believed her own instincts.', color: 'teal' },
                    { dot: '🛡️', year: 'Month 2', label: '"You\'re not stuck. You\'re one question away."', detail: 'When Kermina was about to give up on a project, Mrs. Ashgan said exactly this. Not: "you\'ll figure it out." Not: "don\'t worry." Specific words. A specific belief. Kermina asked the question. The project shipped.', color: 'green' },
                    { dot: '⭐', year: 'Month 3', label: 'She trusted her in front of everyone.', detail: 'She asked Kermina to explain something to the class. Not because Kermina was the best. Because Mrs. Ashgan believed she was ready before Kermina did. That public trust — in a room full of peers — is a gift that compounds.', color: 'gold' },
                    { dot: '🎓', year: 'The Last Day', label: 'She said: "Now you know you can."', detail: 'Five words. After the last project shipped. After all of it. Mrs. Ashgan looked at Kermina and said five words. They didn\'t feel like the end of something. They felt like the beginning.', color: 'pink' },
                ],

                'mem.title': 'رحلة عبر الذكريات', 'mem.subtitle': 'اضغطي ابدأ وامشي في اللحظات اللي فضلت.',
                'mem.start': '▶ ابدئي الرحلة',
                'mem.scenes': [
                    { icon: '🚪', title: 'أول يوم', subtitle: 'الخطوة في المجهول.', text: 'دخلت مش عارفة حد. الأوضة كانت ممتلية بغرباء. وبعدين مدرسة ابتسمت — مش ابتسامة مجاملة، ابتسامة حقيقية. زي إنها شافت حاجة تستاهل تصدّق فيها.', accent: 'blue' },

  <button class="next-button" onclick="nextChapter()">Final Message →</button>`,

                // 15 — Final
                `<div class="terminal" style="max-width:900px;"><div class="terminal-header">${DOTS}<div class="terminal-title">birthday_wishes.execute() — from Kermina</div></div><div class="terminal-body"><div class="final-message" id="final-text" style="min-height:200px;white-space:pre-wrap;"></div><div class="signature" id="final-sig"></div></div></div><button class="next-button" onclick="restart()"><span>${t('ch17.restart')}</span></button>`,
            ];
            return ch[idx] || '';
        }

        function openGift() {
            const box = document.getElementById('gift-emoji'), reveal = document.getElementById('gift-reveal'), hint = document.getElementById('gift-hint');
            if (!box || box.dataset.opened) return;
            box.dataset.opened = '1'; box.classList.add('opened'); if (hint) hint.style.opacity = '0';
            burstParticles(60); addXP(30, 'GIFT'); playChime();
            const wishes_en = ['🌸 May every day feel as meaningful as the days you\'ve made for your students.', '☀️ May this year bring you rest, joy, and everything you deserve.', '💫 May you always know the impact you leave behind — it\'s immeasurable.', '🎂 Happy Birthday, Mrs. Ashgan.'];
            const wishes_ar = ['🌸 يارب كل يوم في حياتك يبقى جميل زي الأيام اللي عملتيهالي .', '☀️ يارب السنة دي تجيب لك راحة وسلام وفرح وكل اللي حضرتك تستحقيه.', '💫 يارب تحسي دايماً بالتأثير اللي بتسيبيه — هو عموما مش بيتقاس.', '🎂 كل سنة وحضرتك طيبة، مس أشجان.'];
            const wishes = currentLang === 'ar' ? wishes_ar : wishes_en;
            setTimeout(() => {
                box.style.display = 'none'; reveal.classList.add('show');
                const list = document.getElementById('wishes-list'); if (!list) return; list.innerHTML = '';
                wishes.forEach((w, i) => {
                    const item = document.createElement('div'); item.className = 'wish-item';
                    const parts = w.split(' '); const emoji = parts[0]; const text = parts.slice(1).join(' ');
                    item.innerHTML = `<span class="wish-emoji">${emoji}</span><span class="wish-text">${text}</span>`;
                    list.appendChild(item); setTimeout(() => item.classList.add('show'), i * 250);
                });
            }, 700);
        }

        let currentChapter = 0;
        const contentEl = document.getElementById('content');

        function updateUI() {
            document.getElementById('chapter-counter').textContent = `${currentChapter + 1} / ${TOTAL}`;
            document.getElementById('progress').style.width = `${((currentChapter + 1) / TOTAL) * 100}%`;
            document.getElementById('back-btn').disabled = currentChapter === 0;
            document.getElementById('fwd-btn').disabled = currentChapter >= TOTAL - 1;
            document.getElementById('skip-btn').disabled = currentChapter >= TOTAL - 1;
        }

        function showChapter(idx, skipAnim) {
            if (heartTimer) { clearInterval(heartTimer); heartTimer = null; }
            if (quoteTimer) { clearInterval(quoteTimer); quoteTimer = null; }
            const div = document.createElement('div');
            div.className = 'chapter'; div.dataset.accent = ACCENTS[idx] || 'blue';
            div.innerHTML = buildChapter(idx);
            contentEl.appendChild(div);
            setTimeout(() => {
                div.classList.add('active');
                if (!skipAnim) div.classList.add('glitch-enter');
                setTimeout(() => div.classList.remove('glitch-enter'), 600);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if (idx === 0) typewrite('typing-output', t('ch1.typeout'), 400, 30, null, true);
                if (CHAPTER_INITS[idx]) CHAPTER_INITS[idx]();
            }, skipAnim ? 10 : 50);
            updateUI();
        }

        function crtFlash(cb) {
            const fl = document.getElementById('crt-flash'); fl.classList.remove('flash'); void fl.offsetWidth; fl.classList.add('flash');
            setTimeout(cb, 200);
        }
        function transition(newIdx) {
            const cur = document.querySelector('.chapter.active');
            if (cur) { cur.classList.remove('active'); cur.classList.add('exit'); setTimeout(() => cur.remove(), 700); }
            crtFlash(() => setTimeout(() => { currentChapter = newIdx; showChapter(currentChapter); }, 150));
        }
        function nextChapter() { if (currentChapter < TOTAL - 1) transition(currentChapter + 1); }
        function prevChapter() { if (currentChapter > 0) transition(currentChapter - 1); }
        function skipToEnd() { transition(TOTAL - 1); }
        function restart() { transition(0); }

        document.addEventListener('keydown', e => {
            if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextChapter(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); prevChapter(); }
        });

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            const isAr = currentLang === 'ar';
            document.documentElement.lang = currentLang; document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.body.classList.toggle('ar', isAr);
            document.getElementById('back-btn').textContent = t('nav.back');
            document.getElementById('skip-btn').textContent = t('nav.skip');
            document.getElementById('fwd-btn').textContent = t('nav.next');
            document.getElementById('lang-btn').textContent = t('nav.lang');
            document.getElementById('kb-hint').textContent = t('kb.hint');
            document.getElementById('lang-btn').classList.toggle('lang-active', isAr);
            const idx = currentChapter;
            const cur = document.querySelector('.chapter.active');
            if (cur) { cur.classList.remove('active'); cur.classList.add('exit'); setTimeout(() => cur.remove(), 400); }
            setTimeout(() => showChapter(idx, true), 440);
        }

        const loadingEl = document.getElementById('loading');
        setTimeout(() => {
            loadingEl.classList.add('hidden');
            setTimeout(() => loadingEl.classList.add('gone'), 650);
            showChapter(0);
        }, 2500);
    </script>
</body>

</html>
